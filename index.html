<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Karaoke List</title>
    <style>
        :root { --bg: #f2f2f7; --card: #fff; --primary: #007aff; --tj: #e91e63; --ky: #03a9f4; }
        body { font-family: -apple-system, sans-serif; background: var(--bg); margin: 0; padding: 10px; font-size: 14px; }
        .container { max-width: 500px; margin: 0 auto; }
        
        /* 입력 폼 */
        .input-form { background: var(--card); padding: 15px; border-radius: 12px; margin-bottom: 15px; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
        .input-form input, .input-form select { width: 100%; padding: 8px; margin-bottom: 8px; border: 1px solid #ddd; border-radius: 6px; box-sizing: border-box; }
        .btn-group { display: flex; gap: 5px; }
        .add-btn { flex: 1; background: var(--primary); color: white; border: none; padding: 10px; border-radius: 6px; font-weight: bold; }

        /* 필터 및 정렬 */
        .controls { position: sticky; top: 0; background: var(--bg); padding: 10px 0; z-index: 10; border-bottom: 1px solid #ddd; }
        .tabs { display: flex; gap: 5px; overflow-x: auto; margin-bottom: 8px; }
        .tab-btn { border: none; padding: 6px 12px; border-radius: 15px; background: #ddd; font-size: 12px; white-space: nowrap; }
        .tab-btn.active { background: #333; color: #fff; }
        .sort-row { display: flex; gap: 5px; justify-content: flex-end; }
        .sort-btn { border: 1px solid #ccc; background: #fff; padding: 4px 8px; border-radius: 4px; font-size: 11px; }

        /* 리스트 항목 */
        #song-list { list-style: none; padding: 0; margin-top: 10px; }
        .song-item { 
            background: var(--card); margin-bottom: 6px; padding: 10px; 
            border-radius: 8px; display: flex; align-items: center; justify-content: space-between;
        }
        .song-info { flex: 1; min-width: 0; }
        .title { font-weight: bold; display: block; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
        .artist { font-size: 12px; color: #777; }
        
        .numbers { display: flex; flex-direction: column; align-items: flex-end; min-width: 70px; margin: 0 10px; font-family: monospace; }
        .t-red { color: var(--tj); font-weight: bold; }
        .k-blue { color: var(--ky); font-weight: bold; }

        .del-btn { background: #ff3b30; color: white; border: none; border-radius: 4px; padding: 4px 8px; font-size: 11px; }
    </style>
</head>
<body>

<div class="container">
    <div class="input-form">
        <select id="in-genre">
            <option value="K-POP">K-POP</option>
            <option value="J-POP">J-POP</option>
            <option value="POP">POP</option>
            <option value="ETC">기타</option>
        </select>
        <input type="text" id="in-title" placeholder="노래 제목">
        <input type="text" id="in-artist" placeholder="가수 이름">
        <div style="display:flex; gap:5px;">
            <input type="number" id="in-tj" placeholder="TJ 번호">
            <input type="number" id="in-ky" placeholder="KY 번호">
        </div>
        <button class="add-btn" onclick="addSong()">리스트에 추가하기</button>
    </div>

    <div class="controls">
        <div class="tabs" id="genre-tabs">
            <button class="tab-btn active" onclick="filterGenre('ALL')">전체</button>
            <button class="tab-btn" onclick="filterGenre('K-POP')">K-POP</button>
            <button class="tab-btn" onclick="filterGenre('J-POP')">J-POP</button>
            <button class="tab-btn" onclick="filterGenre('POP')">POP</button>
        </div>
        <div class="sort-row">
            <button class="sort-btn" onclick="sortData('title')">제목순</button>
            <button class="sort-btn" onclick="sortData('artist')">가수순</button>
        </div>
    </div>

    <ul id="song-list"></ul>
</div>

<script>
    // LocalStorage에서 데이터 불러오기 또는 초기화
    let songs = JSON.parse(localStorage.getItem('myKaraokeData')) || [];
    let currentGenre = "ALL";

    // 곡 추가 함수
    function addSong() {
        const genre = document.getElementById('in-genre').value;
        const title = document.getElementById('in-title').value;
        const artist = document.getElementById('in-artist').value;
        const tj = document.getElementById('in-tj').value || "-";
        const ky = document.getElementById('in-ky').value || "-";

        if(!title || !artist) return alert("제목과 가수를 입력해주세요!");

        songs.push({ id: Date.now(), genre, title, artist, tj, ky });
        saveAndRender();
        
        // 입력창 비우기
        document.getElementById('in-title').value = "";
        document.getElementById('in-artist').value = "";
        document.getElementById('in-tj').value = "";
        document.getElementById('in-ky').value = "";
    }

    // 곡 삭제 함수
    function deleteSong(id) {
        if(confirm("이 곡을 삭제할까요?")) {
            songs = songs.filter(s => s.id !== id);
            saveAndRender();
        }
    }

    // 데이터 저장 및 화면 갱신
    function saveAndRender() {
        localStorage.setItem('myKaraokeData', JSON.stringify(songs));
        render();
    }

    function render() {
        const list = document.getElementById('song-list');
        list.innerHTML = "";
        
        const filtered = currentGenre === "ALL" ? songs : songs.filter(s => s.genre === currentGenre);
        
        filtered.forEach(s => {
            const li = document.createElement('li');
            li.className = 'song-item';
            li.innerHTML = `
                <div class="song-info">
                    <span class="title">${s.title}</span>
                    <span class="artist"><small>[${s.genre}]</small> ${s.artist}</span>
                </div>
                <div class="numbers">
                    <div><span class="t-red">T</span> ${s.tj}</div>
                    <div><span class="k-blue">K</span> ${s.ky}</div>
                </div>
                <button class="del-btn" onclick="deleteSong(${s.id})">삭제</button>
            `;
            list.appendChild(li);
        });
    }

    function filterGenre(genre) {
        currentGenre = genre;
        document.querySelectorAll('.tab-btn').forEach(btn => {
            btn.classList.toggle('active', btn.innerText === (genre === 'ALL' ? '전체' : genre));
        });
        render();
    }

    function sortData(key) {
        songs.sort((a, b) => a[key].localeCompare(b[key], 'ko'));
        render();
    }

    render(); // 초기 로드
</script>

</body>
</html>
